[build]
  command = "npm run build && cd bni-chapter-app && npm install && npm run build && cd .."
  publish = "dist"

[[redirects]]
  from = "/bni/host"
  to = "/bni/index.html"
  status = 200

[[redirects]]
  from = "/bni/host/"
  to = "/bni/index.html"
  status = 200

[[redirects]]
  from = "/bni/*"
  to = "/bni/index.html"
  status = 200

[[redirects]]
  from = "/bni"
  to = "/bni/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
