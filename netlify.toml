# Netlify: connect this repo and use default settings; this file fills in build details.
# Dashboard lives in dashboard-react/; site is served at the root of your *.netlify.app URL (base: "/").

[build]
  base = "dashboard-react"
  command = "npm ci && npm run build"
  publish = "dashboard-react/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback if you add client-side routes later
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
