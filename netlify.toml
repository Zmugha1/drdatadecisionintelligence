# Build from repo root so "Publish directory" stays unambiguous: dashboard-react/dist
# In Netlify UI: clear custom base directory if set, or set Publish to dashboard-react/dist

[build]
  command = "cd dashboard-react && npm ci && npm run build"
  publish = "dashboard-react/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
