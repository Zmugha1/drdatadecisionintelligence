# Netlify runs the command from [build].base (dashboard-react).
# Do NOT add "cd dashboard-react" here — if the UI also sets Base directory
# to dashboard-react, a second "cd" breaks the build.

[build]
  base = "dashboard-react"
  command = "npm ci && npm run build"
  publish = "dashboard-react/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
