# Build from repository root. Leave "Base directory" EMPTY in Netlify UI
# so this file is the single source of truth (avoids dashboard-react/dashboard-react/dist).

[build]
  command = "cd dashboard-react && npm ci && npm run build"
  publish = "dashboard-react/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
